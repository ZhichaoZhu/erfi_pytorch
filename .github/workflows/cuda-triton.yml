name: CUDA Triton

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cuda-triton:
    # Requires a repository runner registered with all of these labels.
    runs-on: [self-hosted, linux, x64, gpu, cuda]
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Verify NVIDIA GPU
        run: nvidia-smi

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test,triton]"

      - name: Verify CUDA and Triton
        run: |
          python -c "import torch, triton; assert torch.cuda.is_available(); print(torch.__version__, torch.version.cuda, triton.__version__, torch.cuda.get_device_name(0))"

      - name: Test
        run: python -m pytest -q
